<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shaya Digital — Video Content Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f8f8f6;
        color: #1a1a1a;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f4f0;
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #6b6966;
        --color-border-primary: #1a1a1a;
        --color-border-secondary: #c8c6c0;
        --color-border-tertiary: #e4e2da;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a1a;
          color: #f0eeea;
          --color-background-primary: #242424;
          --color-background-secondary: #2e2e2e;
          --color-text-primary: #f0eeea;
          --color-text-secondary: #9b9894;
          --color-border-primary: #f0eeea;
          --color-border-secondary: #444240;
          --color-border-tertiary: #343230;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
